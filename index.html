<!DOCTYPE html>
<html>
<head>
    <META charset="UTF-8">
    <title>Website</title>
</head>

 <script>
    let anger = 0;

    function increaseAnger() {
        if (anger <100){
        anger += 10;
        }
        document.getElementById("anger").innerHTML = "Anger: " + anger + "%";
    }
</script>

<body>


    <h1>Welcome</h1>
    <p>321</p>
    <h2 id="anger">Anger: 0%</h2>
    <button onclick="increaseAnger()">Click Me</button>

</body>
</html>
