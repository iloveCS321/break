<!DOCTYPE html>
<html>
<head>
    <META charset="UTF-8">
    <title>Website</title>
    <style>
        .shake {
            animation: shake 0.2s infinite;
        }
        @keyframes shake {
            0% { transform: translate(2px, 2px);    }
            25% { transform: translate(-2px, -2px); }
            50% { transform: translate(2px, -2px);  }
            75% { transform: translate(-2px, 2px);  }
            100% {transform: translate(2px, 2px);    }
        }
    </style>
</head>

 <script>
    let anger = 0;

    function increaseAnger() {
        if (anger <100){
        anger += 10;
        }
        document.getElementById("anger").innerHTML = "Anger: " + anger + "%";

         if (anger >=30 && anger <100){
            document.body.style.backgroundColor = "lightgray"
        }
        if (anger >=50 && anger <100){
            document.querySelector("h1").innerHTML = "stop clicking"
        }
        if (anger >=70 && anger <100){
            document.querySelector("p").innerHTML = "i said stop clicking"
                document.body.classList.add("shake");
        }
         if (anger >=80 && anger <100){
            document.querySelector("p").innerHTML = "you better stop now"
                document.body.classList.add("shake");
        }
         if (anger >=90 && anger <100){
            document.querySelector("p").innerHTML = "this is your final warning"
                document.body.classList.add("shake");
        }

        if (anger ===100){
            document.body.innerHTML = "<h1>you broke the website</h1>"
            document.body.style.backgroundColor = "black";
            document.body.style.color = "red";
        }
    }
</script>

<body>
    <div id="character">(o-o)</div>
<h1 id="title"></h1>
<p id="message"></p>

    <h1>WELCOME!</h1>
    <p>earthquake test</p>
    <h2 id="anger">Anger: 0%</h2>
    <button onclick="increaseAnger()">Click Me</button>

</body>
</html>
