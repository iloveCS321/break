<!DOCTYPE html>
<html>
<head>
    <META charset="UTF-8">
    <title>123ABC</title>
</head>

<script>
    let anger = 0;

    function increaseAnger() {
        anger += 10;
        document.querySelector("h2").innerHTML = "Anger: " + anger + %;
    }
</script>

<body>

    <h1>Abc</h1>
    <p>321</p>
    <h2>Anger: 0%</h2>
    <button onclick="increaseAnger()"</button>

</body>
</html>
