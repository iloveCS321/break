<!DOCTYPE html>
<html>
<head>
    <META charset="UTF-8">
    <title>123ABC</title>
</head>

<body>

    <h1>Abc</h1>
    <p>321</p>
    <h2>Anger: 0%</h2>
    <button onclick="increaseAnger()">Click Me</button>

    <script>
    let anger = 0;

    function increaseAnger() {

    }
</script>
